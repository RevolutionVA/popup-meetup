name: Venue Submission
description: Propose a location to host a Pop-up Meetup
title: "[VENUE] "
labels: ["venue-submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Know a great space for a small tech meetup? We'd love to hear about it. Fill out the details below and we'll follow up.

  - type: input
    id: venue_name
    attributes:
      label: Venue Name
      placeholder: "e.g., Norfolk Public Library - Slover Branch"
    validations:
      required: true

  - type: input
    id: venue_address
    attributes:
      label: Address
    validations:
      required: true

  - type: dropdown
    id: city
    attributes:
      label: City
      options:
        - Norfolk
        - Virginia Beach
        - Chesapeake
        - Hampton
        - Newport News
        - Suffolk
        - Williamsburg
        - Other
    validations:
      required: true

  - type: input
    id: capacity
    attributes:
      label: Estimated Capacity
      placeholder: "e.g., 20-30 people"
    validations:
      required: true

  - type: checkboxes
    id: amenities
    attributes:
      label: Available Amenities
      options:
        - label: Projector or large screen
        - label: Whiteboard
        - label: Wi-Fi
        - label: Tables and chairs
        - label: Accessible entrance
        - label: Parking nearby
        - label: Public transit accessible

  - type: dropdown
    id: cost
    attributes:
      label: Cost to Use
      options:
        - Free
        - Free with conditions (explain in notes)
        - Paid (explain in notes)
        - Unknown
    validations:
      required: true

  - type: input
    id: contact_name
    attributes:
      label: Your Name or Venue Contact Name
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: Contact Email
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Hours of availability, any restrictions, booking process, your relationship to the venue, etc.
    validations:
      required: false

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [RevolutionVA Code of Conduct](../../blob/main/CODE_OF_CONDUCT.md).
          required: true
