name: Triage New Submissions

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Add acknowledgment comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const isTalk = issue.title.startsWith('[TALK]');
            const isVenue = issue.title.startsWith('[VENUE]');

            let message = '';

            if (isTalk) {
              message = '👋 Thanks for submitting a talk proposal! The RevolutionVA team will review your submission within 7 days and follow up here with any questions or next steps.\n\nIn the meantime, feel free to join the conversation in the [757 Tech Slack](https://join.slack.com/t/757dev/shared_invite/zt-37d031yip-yI9z3ez8ezf~mJTy5ICaeQ) — a great place to connect with the community.';
            } else if (isVenue) {
              message = `👋 Thanks for the venue submission! We'll review the details and follow up within 7 days. If you have photos or additional info to share, feel free to add them as a comment.`;
            } else {
              message = `👋 Thanks for opening an issue! The RevolutionVA team will take a look soon.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            });
